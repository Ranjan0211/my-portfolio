<section id="skills" class="position-relative overflow-hidden">

    <div class="tech-circuit"></div>
    <div class="glow-spot top-right"></div>
    <div class="glow-spot bottom-left"></div>

    <div class="container position-relative z-2">

        <div class="row mb-5 align-items-center">
            
            <div class="col-lg-5 text-center text-lg-start mb-4 mb-lg-0">
                <h2 class="section-title display-4 fw-bold mb-0">
                    Tech <span class="text-gradient">Stack</span>
                </h2>
            </div>

            <div class="col-lg-7">
                <div class="d-flex flex-column flex-md-row justify-content-lg-end align-items-center gap-3">
                    
                    <div class="search-wrapper w-100 w-md-auto order-2 order-md-1">
                        <i class="bi bi-search search-icon"></i>
                        <input type="text" class="cyber-search" 
                               placeholder="Find skill..." 
                               [(ngModel)]="searchQuery">
                    </div>

                    <div class="skill-tabs d-flex flex-wrap justify-content-center gap-2 order-1 order-md-2">
                        <button class="tab-btn" [class.active]="activeCategory === 'All'"
                            (click)="setCategory('All')">All</button>

                        <button class="tab-btn" *ngFor="let cat of categories" 
                            [class.active]="activeCategory === cat.name"
                            (click)="setCategory(cat.name)">
                            {{ cat.name }}
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-3 col-md-4 col-sm-6 animate-card" 
                 *ngFor="let skill of visibleSkills; let i = index"
                 [style.animation-delay]="i * 100 + 'ms'">

                <div class="skill-card" [style.--skill-color]="skill.color">

                    <div class="card-shine"></div>

                    <div class="status-badge" *ngIf="skill.status === 'Learning'">
                        <i class="bi bi-mortarboard-fill me-1"></i> Learning
                    </div>

                    <div class="icon-wrapper">
                        <i [class]="skill.icon"></i>
                    </div>

                    <h5 class="skill-name">{{ skill.name }}</h5>

                    <div class="progress-container mt-3">
                        <div class="progress-bar" [style.width.%]="skill.level"></div>
                        <div class="progress-glow" [style.width.%]="skill.level"></div>
                    </div>
                    
                    <div class="d-flex justify-content-between mt-2 align-items-center">
                        <span class="level-text">
                            <i class="bi bi-clock-history me-1"></i> {{ skill.years }} Yrs Exp
                        </span>
                        <span class="level-percent">{{ skill.level }}%</span>
                    </div>

                    <div class="project-overlay">
                        <p class="overlay-title">Used In:</p>
                        <ul class="used-projects-list">
                            <li *ngFor="let proj of skill.projects">
                                <i class="bi bi-check2-circle"></i> {{ proj }}
                            </li>
                        </ul>
                    </div>

                    <div class="skill-glow"></div>
                </div>

            </div>
            
            <div class="col-12 text-center py-5" *ngIf="visibleSkills.length === 0">
                <p class="text-muted">No skills found matching "{{ searchQuery }}"</p>
            </div>
        </div>
    </div>
</section>
