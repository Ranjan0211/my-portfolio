<header class="hero-section d-flex align-items-center">

    <div class="cyber-grid"></div>
    <div class="gradient-orb orb-1"></div>
    <div class="gradient-orb orb-2"></div>

    <div class="code-decor start-0 top-25 opacity-25 d-none d-lg-block">
        &lt;Code /&gt;
    </div>
    <div class="code-decor end-0 bottom-25 opacity-25 d-none d-lg-block">
        &#123; Dev &#125;
    </div>

    <div class="container position-relative z-2">

        <div class="windows-logo-3d">
            <div class="win-pane pane-blue"></div>
            <div class="win-pane pane-yellow"></div>
            <div class="win-pane pane-green"></div>
            <div class="win-pane pane-red"></div>
        </div>

        <div class="row align-items-center">

            <div class="col-lg-7 text-center text-lg-start mb-5 mb-lg-0 position-relative z-1">

                <div class="badge-container mb-3 d-inline-block">
                    <h1 class="display-1 fw-bold mb-2 tracking-tight">
                    HAY <span class="name-highlight">!</span>
                </h1>
                </div>

                <h1 class="display-1 fw-bold mb-2 tracking-tight">
                    I'm <span class="name-highlight">Ranjan Kumar</span>
                </h1>

                <div
                    class="h3 mb-4 fw-light text-light d-flex align-items-center justify-content-center justify-content-lg-start gap-2">
                    <span class="text-muted">&gt;</span>
                    <div class="typewriter">
                        <span class="typewriter-text"></span>
                    </div>
                </div>

                <p class="lead text-secondary mb-5 hero-desc mx-auto mx-lg-0">
                    I build pixel-perfect, scalable web applications using
                    <span class="text-white fw-medium">Angular 18+</span> and
                    <span class="text-white fw-medium">.NET Core</span>.
                    Let's turn your vision into high-performance code.
                </p>

                <div class="d-flex gap-3 justify-content-center justify-content-lg-start">
                    <button (click)="scrollToContact()" class="btn btn-glass px-5 py-3 fw-bold">
                        Let's Talk <i class="bi bi-arrow-right ms-2"></i>
                    </button>
                </div>

                <div class="mt-5 pt-3 d-flex gap-4 justify-content-center justify-content-lg-start tech-stack-row">
                    <i class="devicon-angularjs-plain"></i>
                    <i class="devicon-dotnetcore-plain"></i>
                    <i class="devicon-typescript-plain"></i>
                    <i class="devicon-azure-plain"></i>
                </div>
            </div>

            <div class="col-lg-5 position-relative text-center text-lg-end">

                <div class="profile-card">
                    <div class="card-glow"></div>

                    <img src="image/Ranjan-Image.png" alt="Ranjan Kumar" class="hero-img">

                    <div class="float-badge badge-top-right">
                        <i class="bi bi-lightning-fill text-warning"></i>
                        <span>Fast</span>
                    </div>
                    <div class="float-badge badge-bottom-left">
                        <i class="bi bi-shield-check-fill text-success"></i>
                        <span>Secure</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</header>
